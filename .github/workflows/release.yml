name: Release

on:
  push:
    tags:
    - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
    - run: go test ./...
    - run: go build -ldflags="-s -w" -o lrc .

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
    - uses: golangci/golangci-lint-action@v9
      with:
        version: v2.12.2

  build:
    needs: [ test, lint ]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version-file: go.mod
    - name: Build all binaries
      run: |
        mkdir -p dist
        for pair in linux-amd64 linux-arm64 linux-arm linux-386 darwin-amd64 darwin-arm64 freebsd-amd64; do
          os="${pair%-*}"
          arch="${pair#*-}"
          asset="lrc-${os}-${arch}"
          echo "building ${asset}"
          CGO_ENABLED=0 GOOS="${os}" GOARCH="${arch}" go build -ldflags="-s -w" -o "dist/${asset}" .
          (cd dist && sha256sum "${asset}" > "${asset}.sha256")
        done
        (cd dist && find . -maxdepth 1 -type f -name 'lrc-*' ! -name '*.sha256' -exec sha256sum {} \; > checksums.txt)
        echo "${{ github.ref_name }}" > dist/version.txt
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/*

  release:
    needs: [ build, test, lint ]
    runs-on: ubuntu-latest
    steps:
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: dist
        path: dist
    - name: Create release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/*
        generate_release_notes: true
